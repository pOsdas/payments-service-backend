version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: test_backend_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: test_backend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d test_backend"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: test_backend_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/test_backend
    command: >
      sh -c "python ensure_db.py --env-file .env &&
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - .:/app

  rabbitmq:
    image: rabbitmq:3-management
    container_name: payments_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  outbox_publisher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payments_outbox_publisher
    command: poetry run python -m app.workers.outbox_publisher
    env_file:
      - .env
    depends_on:
      - db
      - rabbitmq

  consumer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payments_consumer
    command: poetry run python -m app.workers.payment_consumer
    env_file:
      - .env
    depends_on:
      - db
      - rabbitmq

volumes:
  postgres_data: